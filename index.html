<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Arcane GI Labyrinth</title>
    <script type="module" crossorigin src="./assets/index-Bw4bER3x.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CsCfJBU2.css">
  </head>
  <body>
    <main class="stage">
      <canvas id="game" width="1280" height="720"></canvas>
      <section class="hud hud-left">
        <strong>Arcane GI Labyrinth</strong>
        <span>WASD: move</span>
        <span>Mouse: third-person aim</span>
        <span>Click: draw and fire / Space: jump</span>
        <span>Shift: sprint</span>
      </section>
      <section class="hud hud-right" id="status"></section>
      <section class="prompt" id="prompt">Click the game screen to capture mouse look.</section>
      <section class="statue-panel" id="statuePanel">
        <canvas id="threeStatue"></canvas>
        <div>Rune guardian preview</div>
      </section>
    </main>
    <script>
      window.addEventListener("error", (event) => {
        const target = document.getElementById("status");
        if (target) {
          target.hidden = false;
          target.style.display = "block";
          target.innerHTML = `Runtime error<br>${String(event.message || event.error || "unknown").slice(0, 180)}`;
        }
      });
      window.addEventListener("unhandledrejection", (event) => {
        const target = document.getElementById("status");
        if (target) {
          target.hidden = false;
          target.style.display = "block";
          target.innerHTML = `Runtime error<br>${String(event.reason?.message || event.reason || "unknown").slice(0, 180)}`;
        }
      });
    </script>
  </body>
</html>
